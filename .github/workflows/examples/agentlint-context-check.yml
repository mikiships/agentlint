name: agentlint context check

on:
  schedule:
    # Every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  push:
    paths:
      - "AGENTS.md"
      - "CLAUDE.md"
      - "GEMINI.md"
      - ".cursorrules"

jobs:
  context-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run agentlint context check
        id: ctx
        uses: mikiships/agentlint@main
        with:
          mode: context-check
          # Optional: pin to a specific file
          # context-file: AGENTS.md

      - name: Print freshness score
        run: |
          echo "Freshness score: ${{ steps.ctx.outputs.freshness-score }}/100"
          echo "Findings: ${{ steps.ctx.outputs.context-findings }}"
